services:
  - type: web
    name: ecommerce-backend
    runtime: java
    buildCommand: cd backend && ./mvnw clean package -DskipTests
    startCommand: java -jar backend/target/backend-0.0.1-SNAPSHOT.jar
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: ecommerce-db
          property: connectionString
      - key: JWT_SECRET
        value: 404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
      - key: STRIPE_API_KEY
        value: sk_test_YOUR_KEY

databases:
  - name: ecommerce-db
    databaseName: ecommerce_db
    user: postgres
